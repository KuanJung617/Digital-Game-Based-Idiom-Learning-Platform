<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡迎來到成語世界</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <!-- Google 字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            /*font-family: 'Noto Serif TC', serif;*/
            padding: 50px 0;
        }
        .welcome-container {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            color: #007bff;
            font-weight: 700;
        }
        p {
            color: #555;
            font-weight: 400;
        }
        .card {
            border: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-title {
            font-weight: 700;
            color: #007bff;
        }
        .btn-role {
            background-color: #007bff;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container text-center">
      <div class="welcome-container mb-5">
        <h1 class="display-4 text-primary font-weight-bold">成語小學堂</h1>
        <p class="lead text-secondary">歡迎來到成語小學堂，這裡有豐富的成語教學與趣味遊戲，讓你邊學邊玩，輕鬆掌握成語！</p>
      </div>

      <div class="row justify-content-center">
        <!-- 教師卡片 -->
        <div class="col-md-4 mb-4">
          <div class="card h-100 shadow-sm">
            <div class="card-body d-flex flex-column">
              <div class="mb-3">
                <span style="font-size: 2.5rem;">📘</span>
              </div>
              <h5 class="card-title text-primary font-weight-bold">我是教師</h5>
              <p class="card-text text-muted">編輯題庫、管理學生學習成效，掌握教學進度。</p>
              <div class="mt-auto">
                <a href="/teacher/teacher.html" class="btn btn-primary btn-block rounded-pill">進入教師介面</a>
              </div>
            </div>
          </div>
        </div>

        <!-- 學生卡片 -->
        <div class="col-md-4 mb-4">
          <div class="card h-100 shadow-sm">
            <div class="card-body d-flex flex-column">
              <div class="mb-3">
                <span style="font-size: 2.5rem;">✏️</span>
              </div>
              <h5 class="card-title text-success font-weight-bold">我是學生</h5>
              <p class="card-text text-muted">透過互動遊戲與題庫練習，輕鬆學習成語。</p>
              <div class="mt-auto">
                <a href="/student/login.html" class="btn btn-success btn-block rounded-pill">進入學生介面</a>
              </div>
            </div>
          </div>
        </div>

        <!-- 訪客卡片 -->
        <div class="col-md-4 mb-4">
          <div class="card h-100 shadow-sm">
            <div class="card-body d-flex flex-column">
              <div class="mb-3">
                <span style="font-size: 2.5rem;">🚶‍♂️</span>
              </div>
              <h5 class="card-title text-secondary font-weight-bold">我是訪客</h5>
              <p class="card-text text-muted">瀏覽平台功能，體驗成語世界的魅力。</p>
              <div class="mt-auto">
                <a href="/guest/guest.html" class="btn btn-secondary btn-block rounded-pill">進入訪客介面</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
</body>
</html>
