<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>遊戲專區（訪客）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .card:hover {
      transform: scale(1.03);
      transition: 0.2s;
    }
  </style>
</head>
<body class="bg-light">

<div class="container py-4">

  <!-- 標題與返回首頁 -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>🎮 遊戲專區（訪客）</h2>
    <a href="/guest/guest.html" class="btn btn-outline-secondary">返回訪客首頁</a>
  </div>

  <!-- 訪客資訊 -->
  <div class="alert alert-warning">
    🧑‍💻 目前為 <strong>訪客模式</strong>，可自由體驗所有遊戲！
  </div>

  <!-- ================== 選擇遊戲 ================== -->
  <div id="gameSelect" class="row g-4 mt-2">
    <h4 class="text-center mb-4">🎯 請選擇遊戲類型</h4>

    <!-- 成語拼圖 -->
    <div class="col-md-6 col-lg-6">
      <div class="card h-100 shadow text-center border-primary">
        <div class="card-body d-flex flex-column justify-content-center">
          <h5 class="card-title">🧩 成語拼圖</h5>
          <p class="card-text text-muted">拖曳拼圖片塊，完成成語挑戰！</p>
          <button class="btn btn-primary mt-auto" onclick="startGame('./games/puzzle.html')">開始遊戲</button>
        </div>
      </div>
    </div>

    <!-- 找成語 -->
    <div class="col-md-6 col-lg-6">
      <div class="card h-100 shadow text-center border-success">
        <div class="card-body d-flex flex-column justify-content-center">
          <h5 class="card-title">✍️ 找成語</h5>
          <p class="card-text text-muted">根據提示輸入正確的成語。</p>
          <button class="btn btn-success mt-auto" onclick="startGame('./games/findIdiom/find.html')">開始遊戲</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // ========== 進入遊戲 ==========
  function startGame(url) {
    window.location.href = url;
  }
</script>

</body>
</html>
