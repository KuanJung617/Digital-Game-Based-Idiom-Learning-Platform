<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>查詢成語</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>🔍 自由查詢成語</h2>
    <a href="./guest.html" class="btn btn-outline-secondary btn-sm">返回訪客首頁</a>
  </div>

  <p class="text-muted">輸入成語來查詢意思、出處與例句。</p>

  <div class="input-group mb-3">
    <input type="text" id="chengyuInput" class="form-control" placeholder="請輸入成語">
    <button class="btn btn-success" onclick="searchChengyu()">查詢</button>
  </div>

  <div id="result" class="border rounded p-3 bg-white">
    <p class="text-muted mb-0">尚未查詢任何成語。</p>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]||m));

  function searchChengyu() {
    const word = $('chengyuInput').value.trim();
    if (!word) return;
    socket.emit('chengyuWord', word);
  }

  socket.on('chengyuWordResult', (d) => {
    const r = $('result');
    r.innerHTML = !d
      ? '<p class="text-danger">未找到該成語</p>'
      : `
        <h4>${esc(d.idiom)}</h4>
        <p><strong>注音：</strong> ${esc(d.zhuyin)}</p>
        <p><strong>釋義：</strong> ${esc(d.meaning)}</p>
        <p><strong>用法說明：</strong> ${esc(d.usage_category)}</p>
        <p><strong>例句：</strong> ${esc(d.usage_example)}</p>
        <p><strong>近義成語：</strong> ${esc(d.near_synonyms)}</p>
        <p><strong>反義成語：</strong> ${esc(d.opposite_idioms)}</p>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-primary btn-sm" onclick="playAudio('${esc(d.idiom)}')">🔊 播放語音</button>
        </div>
      `;
  });

  function playAudio(word) {
    socket.emit('ttsWord', String(word || '').trim());
  }

  socket.on('ttsWordResult', ({ data, mime }) => {
    try {
      const blob = b64ToBlob(data, mime || 'audio/mpeg');
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.play().catch(console.warn);
      audio.onended = () => URL.revokeObjectURL(url);
    } catch (e) {
      console.error('播放失敗', e);
    }
  });

  const b64ToBlob = (b64, mime='application/octet-stream') => {
    const bin = atob(b64);
    const len = bin.length;
    const buf = new Uint8Array(len);
    for (let i = 0; i < len; i++) buf[i] = bin.charCodeAt(i);
    return new Blob([buf], { type: mime });
  };
</script>

</body>
</html>
