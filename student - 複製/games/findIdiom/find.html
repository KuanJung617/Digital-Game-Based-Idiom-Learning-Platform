<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找成語遊戲</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
<div class="container py-4">

    <!-- 標題列 -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>✍️ 找成語</h2>
        <button class="btn btn-outline-secondary" onclick="backToStage()">返回遊戲選擇</button>
    </div>

    <!-- 學生資料 -->
    <div class="alert alert-info" id="studentInfo">學生資料載入中...</div>

    <!-- 題庫來源 -->
    <div id="quizSource" class="mb-3"></div>

    <!-- 提示區 -->
    <h5 id="hint" class="text-center mb-3 text-muted">題目載入中...</h5>

    <!-- 字卡區 -->
    <div id="characters" class="grid-container mb-3"></div>

    <!-- 學生選擇 -->
    <div id="user-selection" class="text-center fw-bold fs-5 mb-3"></div>

    <!-- 按鈕 -->
    <div class="text-center mb-3">
        <button class="btn btn-primary" onclick="checkAnswer()">提交</button>
        <button class="btn btn-secondary" onclick="showHint()">提示</button>
    </div>

    <!-- 結果 & 釋義 -->
    <div id="result" class="text-center fs-4 fw-bold"></div>
    <div id="meaning" class="text-center fs-5 text-muted"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
