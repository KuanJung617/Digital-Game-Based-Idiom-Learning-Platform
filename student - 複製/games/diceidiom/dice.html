<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>🎲 成語擲骰搶答對戰</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg,#f0f4ff,#e6ecff);
      padding: 20px;
    }
    .game-container {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-width: 800px;
      margin: auto;
      padding: 30px;
      text-align: center;
    }
    .dice {
      font-size: 90px;
      cursor: pointer;
      display: inline-block;
      user-select: none;
      transition: transform 0.3s ease;
    }
    .dice.rolling {
      animation: diceRoll 0.8s ease;
    }
    @keyframes diceRoll {
      0% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(90deg) scale(1.2); }
      50% { transform: rotate(180deg) scale(0.9); }
      75% { transform: rotate(270deg) scale(1.2); }
      100% { transform: rotate(360deg) scale(1); }
    }
    #question { 
      font-size: 1.3em; 
      margin-top: 15px; 
      text-align: center; 
    }
    .buzz-btn { font-size: 1.3em; }
  </style>
</head>
<body>
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>🎲 成語擲骰搶答對戰</h2>
    <button class="btn btn-outline-secondary" onclick="backToStage()">返回遊戲選擇</button>
  </div>

  <div id="studentInfo" class="alert alert-info"></div>

  <div id="loginSection" class="text-center">
    <button id="joinBtn" class="btn btn-primary w-100">加入對戰</button>
  </div>

  <div id="gameSection" class="d-none game-container">
    <div class="mb-3">
      <div id="player1" class="fw-bold"></div>
      <div id="player2" class="fw-bold"></div>
    </div>

    <div>
      <div id="dice" class="dice">🎲</div><br>
      <button id="rollBtn" class="btn btn-success mt-2">擲骰出題</button>
    </div>

    <div id="question" class="mt-3">請擲骰開始！</div>

    <div class="mt-3">
      <button id="buzzBtn" class="btn btn-warning buzz-btn d-none">⚡ 搶答</button>
      <input id="answerInput" type="text" class="form-control d-none" placeholder="請輸入答案">
      <button id="submitBtn" class="btn btn-primary d-none">送出答案</button>
    </div>

    <ul id="scoreList" class="list-group mt-3"></ul>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const $ = s => document.querySelector(s);
const dice = $("#dice");
const rollBtn = $("#rollBtn");
const questionDiv = $("#question");
const buzzBtn = $("#buzzBtn");
const submitBtn = $("#submitBtn");
const answerInput = $("#answerInput");
const scoreList = $("#scoreList");
const joinBtn = $("#joinBtn");
const loginSection = $("#loginSection");
const gameSection = $("#gameSection");
let myId = null;
let currentQuestion = null;
let playerName = "匿名玩家";

/* ====== 學生登入驗證 ====== */
(function initStudentInfo(){
  const raw = sessionStorage.getItem('studentCtx');
  if (!raw) { location.href = '/student/login.html'; return; }
  let ctx = JSON.parse(raw);
  const cls = ctx.className, no = ctx.number, name = ctx.name;
  playerName = `${cls}-${no}號 ${name}`;
  $('#studentInfo').innerHTML = `班級：<b>${cls}</b> ／ 座號：<b>${no}</b> ／ 姓名：<b>${name}</b>`;
  socket.emit('initStudentrom', cls, no, 'studentDice');
})();
socket.on('initStudentromResult',()=>{});

socket.on("connect", () => myId = socket.id);

joinBtn.onclick = () => {
  joinBtn.disabled = true;
  joinBtn.textContent = "等待對手中...";
  socket.emit("joinQueue", { playerName });
};

socket.on("matchSuccess", (roomId, players) => {
  loginSection.classList.add("d-none");
  gameSection.classList.remove("d-none");
  $("#player1").textContent = players[0]?.name || "等待中...";
  $("#player2").textContent = players[1]?.name || "";
  updateScoreList({});
  questionDiv.textContent = "🎲 請擲骰出題！";
  rollBtn.disabled = false;
});

socket.on("updateTurn", ({ turnId }) => {
  if (turnId === myId) {
    rollBtn.disabled = false;
    questionDiv.textContent = "🎯 請擲骰開始答題！";
  } else {
    rollBtn.disabled = true;
    questionDiv.textContent = "🎲 對手正在擲骰子...";
  }
});

/* ====== 🎲 平面旋轉骰子動畫 ====== */
rollBtn.onclick = () => {
  rollBtn.disabled = true;
  dice.classList.add("rolling");

  // 動畫結束後
  setTimeout(() => {
    dice.classList.remove("rolling");
    // 保留原本 🎲
    dice.textContent = "🎲";
    socket.emit("rollDice"); // 通知後端出題
    rollBtn.disabled = false;
  }, 800);
};

/* ====== 顯示題目 ====== */
socket.on("showQuestion", (q) => {
  currentQuestion = q;
  const typeName = q.type === "image" ? "圖片題" :
                   q.type === "choice" ? "選擇題" : "問答題";
  questionDiv.innerHTML = `🎲 你骰到的是：<b>${typeName}</b><br>${q.question}<br><br>按下搶答搶先回答！`;

  buzzBtn.classList.remove("d-none");
  answerInput.classList.add("d-none");
  submitBtn.classList.add("d-none");
});

/* ====== 搶答 ====== */
buzzBtn.onclick = () => socket.emit("buzzIn");

socket.on("playerBuzzed", ({ playerId }) => {
  if (playerId === myId) {
    buzzBtn.classList.add("d-none");

    if (currentQuestion.type === "choice") {
      questionDiv.innerHTML = `${currentQuestion.question}<br>` +
        currentQuestion.options.map(o => 
          `<button class='btn btn-outline-primary m-1 optBtn'>${o}</button>`
        ).join("");
    } else {
      answerInput.classList.remove("d-none");
      submitBtn.classList.remove("d-none");
      answerInput.focus();
    }
  } else {
    questionDiv.textContent = "⏳ 對方已搶答！";
    buzzBtn.classList.add("d-none");
  }
});

document.addEventListener("click", (e) => {
  if (e.target.classList.contains("optBtn")) {
    socket.emit("submitAnswer", { answer: e.target.textContent });
    document.querySelectorAll(".optBtn").forEach(btn => btn.disabled = true);
  }
});

submitBtn.onclick = () => {
  socket.emit("submitAnswer", { answer: answerInput.value });
  answerInput.value = "";
  answerInput.classList.add("d-none");
  submitBtn.classList.add("d-none");
};

socket.on("answerResult", ({ playerId, correct, scores }) => {
  questionDiv.textContent = correct ? "✅ 答對！" : "❌ 答錯！";
  updateScoreList(scores);
  rollBtn.disabled = false;
  buzzBtn.classList.add("d-none");
});

function updateScoreList(scores) {
  scoreList.innerHTML = Object.entries(scores)
    .map(([id, s]) => `<li class="list-group-item">${id === myId ? "我" : "對手"}：${s} 分</li>`)
    .join("");
}

function backToStage() {
  window.location.href = "/student/games.html?returnTo=gameSelect";
}
</script>
</body>
</html>
