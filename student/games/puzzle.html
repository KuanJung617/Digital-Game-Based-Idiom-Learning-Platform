<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>🧩 成語拼圖遊戲</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    .puzzle-container {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .puzzle-piece,
    .puzzle-slot {
      width: 60px;
      height: 60px;
      border: 2px dashed #aaa;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.5rem;
      user-select: none;
      background: #fff;
      border-radius: 0.5rem;
      transition: transform 0.12s ease;
    }
    .puzzle-piece {
      cursor: grab;
    }
    .puzzle-piece:active {
      cursor: grabbing;
      transform: scale(0.98);
    }
    .puzzle-slot {
      border: 2px solid #0d6efd;
      background: #f8f9fa;
    }
    .slot-hover {
      outline: 3px dashed #0d6efd;
      outline-offset: -4px;
    }
    .correct {
      background: #d4edda !important;
      border-color: #28a745 !important;
    }
    .tray-title {
      font-size: 0.95rem;
      color: #6c757d;
    }
  </style>
</head>
<body class="bg-light">
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="m-0">🧩 成語拼圖遊戲</h2>
      <div class="d-flex align-items-center gap-2">
        <button id="btnSpeak" class="btn btn-outline-primary btn-sm" type="button" title="播放本題成語語音">🔊 播放成語</button>
        <button class="btn btn-outline-secondary" onclick="backToStage()">返回遊戲選擇</button>
      </div>
    </div>

    <div class="alert alert-info py-2" id="studentInfo">學生資料載入中...</div>
    <div id="quizSource" class="alert alert-secondary py-2"></div>

    <div class="mb-3">
      <h5 id="questionTitle" class="mb-1">題目：請拼出正確的成語</h5>
      <p id="questionillustrate" class="mb-1 text-primary small"></p>
      <p class="text-muted mb-0" id="hint">請根據提示把字卡拖進上方藍色框（或點一下字卡自動放入）。</p>
    </div>

    <div class="puzzle-container mb-2" id="puzzleSlots"></div>

    <div class="text-center tray-title">字卡托盤（點一下可放入／取回）</div>
    <div class="puzzle-container" id="puzzlePieces"></div>

    <div id="feedback" class="text-center mt-3 fw-bold"></div>

    <div class="mt-4 text-center">
      <button class="btn btn-primary me-2" id="checkAnswer">確認答案</button>
      <button class="btn btn-secondary me-2" id="clearPuzzle">清除</button>
      <button class="btn btn-success" id="nextQuestion" disabled>下一題</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let quizData = { name: "", questions: [] };
    let currentIndex = 0;
    let shuffledQuestions = [];
    let audioEl = null;

    const answerStats = { correct: 0, wrong: [], total: 0 };
    let studentCtx = null;

    /* ====== 學生資訊 ====== */
    (function initStudentInfo() {
      try {
        const raw = sessionStorage.getItem("studentCtx");
        const ctx = raw ? JSON.parse(raw) : {};
        studentCtx = ctx || {};

        const cls  = String(ctx?.className ?? '').trim();
	  const no   = String(ctx?.number ?? '').trim();
	  let name   = String(ctx?.name ?? '').trim();
	  const room = new URLSearchParams(location.search).get('room') || "studentPuzzle";

        const infoEl = document.getElementById("studentInfo");
        infoEl.textContent = `${cls ? cls + "班 " : ""}${no ? no + "號 " : ""}${name || ""}`;
		socket.emit('initStudentgames', cls, no, room);
		  socket.on('initStudentgamesResult', (res) => {
			if (!res?.ok) return;
			if (res.name) {
			  name = String(res.name).trim();
			  globalStudent.name = name;
			  const nextCtx = { ...ctx, name };
			  sessionStorage.setItem('studentCtx', JSON.stringify(nextCtx));
			  $('#studentInfo').innerHTML = `班級：<b>${esc(cls)}</b> ／ 座號：<b>${esc(no)}</b> ／ 姓名：<b>${esc(name)}</b>`;
			}
		  });
      } catch {
        document.getElementById("studentInfo").textContent = "未登入 / 無學生資訊";
      }
    })();

    /* ====== 模式判斷 ====== */
    const params = new URLSearchParams(location.search);
    const mode = params.get("source") || localStorage.getItem("gameMode") || "teacher";
    const selectedWeek = Number(params.get("week")) || Number(localStorage.getItem("selectedTeacherWeek")) || 1;
    localStorage.setItem("selectedTeacherWeek", selectedWeek);

    /* ====== 取得題庫 ====== */
    socket.on("connect", () => {
      socket.emit("idiomGameInit", {
        className: studentCtx?.className,
        number: studentCtx?.number,
        name: studentCtx?.name,
        gameMode: mode,
        space: "idiomPuzzle",
      });

      if (mode === "teacher") {
        socket.emit("getWeekQuiz", { week: selectedWeek });
      } else {
        socket.emit("getFreeQuiz");
      }
    });

    // 教師題庫
    socket.on("weekQuiz", (res) => {
      if (res?.success && Array.isArray(res.data) && res.data.length > 0) {
        quizData = {
          name: `第 ${selectedWeek} 週 教師指定題庫`,
          questions: res.data
            .filter(q => q.idiom && q.idiom.length === 4)
            .map(q => ({ idiom: q.idiom, chars: q.idiom.split(""), meaning: q.meaning || "" }))
        };
      } else {
        quizData = { name: "本週無題目", questions: [] };
      }
      startGame();
    });

    // 自由題庫
    socket.on("freeQuiz", (res) => {
      if (res.success && res.data.length > 0) {
        quizData = {
          name: "自由練習題庫",
          questions: res.data
            .filter(q => q.idiom && q.idiom.length === 4)
            .map(q => ({ idiom: q.idiom, chars: q.idiom.split(""), meaning: q.meaning || "" }))
        };
      } else {
        quizData = { name: "自由題庫目前無題目", questions: [] };
      }
      startGame();
    });

    /* ====== 遊戲啟動 ====== */
    function startGame() {
      document.getElementById("quizSource").innerHTML =
        `📘 題庫來源：<strong>${quizData.name}</strong> ${mode === "teacher" ? "(教師指定)" : "(自由練習)"}`;
      shuffledQuestions = shuffleArray([...quizData.questions]);
      currentIndex = 0;
      answerStats.correct = 0;
      answerStats.wrong = [];
      answerStats.total = shuffledQuestions.length;
      initPuzzle();
    }

    /* ====== 初始化拼圖 ====== */
    function initPuzzle() {
      clearFeedback();
      toggleBtn("nextQuestion", true);

      if (currentIndex >= shuffledQuestions.length) {
        document.getElementById("puzzleSlots").innerHTML = "";
        document.getElementById("puzzlePieces").innerHTML = "";
        showFeedback("🎉 所有題目都完成了！", "success");
        toggleBtn("checkAnswer", true);
        toggleBtn("clearPuzzle", true);
        toggleBtn("btnSpeak", true);
        return;
      }

      const q = shuffledQuestions[currentIndex];
      const idiomChars = q.chars;
      const shuffled = shuffleArray([...idiomChars]);
      const slots = document.getElementById("puzzleSlots");
      const tray = document.getElementById("puzzlePieces");
      slots.innerHTML = "";
      tray.innerHTML = "";

      idiomChars.forEach(ch => {
        const slot = document.createElement("div");
        slot.className = "puzzle-slot";
        slot.dataset.answer = ch;
        addSlotDnD(slot);
        slot.addEventListener("click", () => removeFromSlot(slot));
        slots.appendChild(slot);
      });

      shuffled.forEach((ch, i) => {
        const piece = createPiece(ch, `p-${currentIndex}-${i}`);
        tray.appendChild(piece);
      });

      document.getElementById("questionTitle").textContent =
        `題目 ${currentIndex + 1}/${shuffledQuestions.length}：請拼出正確的成語`;
      document.getElementById("questionillustrate").textContent = q.meaning || "（無釋義資料）";
      toggleBtn("checkAnswer", false);
      toggleBtn("clearPuzzle", false);
      toggleBtn("btnSpeak", false);
    }

    /* ====== 拼圖互動 ====== */
    function createPiece(char, id) {
      const el = document.createElement("div");
      el.className = "puzzle-piece";
      el.textContent = char;
      el.id = id;
      el.draggable = true;
      el.addEventListener("dragstart", e => e.dataTransfer.setData("text/plain", el.id));
      el.addEventListener("click", () => {
        const parentIsSlot = el.parentElement?.classList.contains("puzzle-slot");
        if (parentIsSlot) {
          document.getElementById("puzzlePieces").appendChild(el);
        } else {
          const empty = [...document.querySelectorAll(".puzzle-slot")].find(s => s.children.length === 0);
          if (empty) empty.appendChild(el);
        }
      });
      return el;
    }

    function addSlotDnD(slot) {
      slot.addEventListener("dragover", e => { e.preventDefault(); slot.classList.add("slot-hover"); });
      slot.addEventListener("dragleave", () => slot.classList.remove("slot-hover"));
      slot.addEventListener("drop", e => {
        e.preventDefault(); slot.classList.remove("slot-hover");
        const id = e.dataTransfer.getData("text/plain");
        const piece = document.getElementById(id);
        if (!piece) return;
        if (slot.children.length === 0) slot.appendChild(piece);
      });
    }

    /* ====== 核對答案 ====== */
    document.getElementById("checkAnswer").addEventListener("click", () => {
      const slots = document.querySelectorAll(".puzzle-slot");
      const q = shuffledQuestions[currentIndex];
      let userAnswer = "";
      let filled = true;

      slots.forEach(slot => {
        const ch = slot.firstElementChild?.textContent || "";
        if (!ch) filled = false;
        userAnswer += ch;
        slot.classList.remove("correct");
      });

      if (!filled) {
        showFeedback("請先將所有字填滿再確認！", "warning");
        return;
      }

      const correct = userAnswer === q.idiom;
      toggleBtn("nextQuestion", false);

      if (correct) {
        slots.forEach(slot => slot.classList.add("correct"));
        showFeedback(`✅ 答對了！「${q.idiom}」`, "success");
        answerStats.correct++;
      } else {
        showFeedback(`❌ 錯誤！正確答案是「${q.idiom}」`, "danger");
        answerStats.wrong.push({ index: currentIndex + 1, idiom: q.idiom, userAnswer });
      }
    });

    document.getElementById("clearPuzzle").addEventListener("click", () => {
      document.querySelectorAll(".puzzle-slot").forEach(slot => {
        if (slot.firstElementChild) document.getElementById("puzzlePieces").appendChild(slot.firstElementChild);
        slot.classList.remove("correct");
      });
      showFeedback("🧹 已清除拼圖，請重新嘗試！", "secondary");
    });

    document.getElementById("nextQuestion").addEventListener("click", () => {
      currentIndex++;
      initPuzzle();
    });

    document.getElementById("btnSpeak").addEventListener("click", () => {
      const q = shuffledQuestions[currentIndex];
      if (!q) return;
      socket.emit("ttsWord", q.idiom);
      socket.once("ttsWordResult", ({ data, mime }) => {
        if (!audioEl) audioEl = new Audio();
        audioEl.src = `data:${mime || "audio/mpeg"};base64,${data}`;
        audioEl.play();
      });
    });

    /* ====== 工具 ====== */
    function removeFromSlot(slot) {
      if (slot.children.length > 0) document.getElementById("puzzlePieces").appendChild(slot.firstElementChild);
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function showFeedback(msg, type) {
      document.getElementById("feedback").innerHTML = `<div class="alert alert-${type} d-inline-block px-4 py-2 mb-0">${msg}</div>`;
    }

    function clearFeedback() {
      document.getElementById("feedback").innerHTML = "";
    }

    function toggleBtn(id, disabled) {
      const el = document.getElementById(id);
      if (el) el.disabled = !!disabled;
    }

    function backToStage() {
      window.location.href = "/student/games.html?returnTo=gameSelect";
    }
  </script>
</body>
</html>
