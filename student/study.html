<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>學習專區</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>.choice-card{transition:.2s;cursor:pointer}.choice-card:hover{transform:translateY(-4px);box-shadow:0 8px 18px rgba(0,0,0,.12)}</style>
</head>
<body class="bg-light">
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>📚 學習專區</h2>
    <a id="backHome" href="student_home.html" class="btn btn-outline-secondary">返回學生首頁</a>
  </div>

  <div class="alert alert-info" id="studentInfo">學生資料載入中...</div>

  <div class="row g-4 justify-content-center">
    <!-- 教師指定（打開教師指定 Modal） -->
    <div class="col-md-5">
      <div id="teacherCard" class="card h-100 text-center choice-card">
        <div class="card-body d-flex flex-column">
          <h3>👩‍🏫 教師指定成語</h3>
          <p class="text-muted">老師安排的成語與教材</p>
          <button id="openTeacherBtn" class="btn btn-primary mt-auto" type="button">進入</button>
        </div>
      </div>
    </div>
    <!-- 自由查詢（打開查詢 Modal） -->
    <div class="col-md-5">
      <div id="searchCard" class="card h-100 text-center choice-card">
        <div class="card-body d-flex flex-column">
          <h3>🔍 自由查詢成語</h3>
          <p class="text-muted">輸入關鍵字查詢成語</p>
          <button id="openSearchBtn" class="btn btn-info mt-auto text-white" type="button" data-bs-toggle="modal" data-bs-target="#chengyuModal">開啟查詢</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 自由查詢 Modal -->
<div class="modal fade" id="chengyuModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable modal-fullscreen-sm-down">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">🔍 自由查詢成語</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div class="row g-2 mb-2">
          <div class="col-md-9"><input id="kw" class="form-control" placeholder="輸入關鍵字"></div>
          <div class="col-md-3 d-grid"><button id="btnSearch" class="btn btn-primary">搜尋</button></div>
        </div>
        <div id="loading" class="d-none text-center py-2"><div class="spinner-border"></div></div>
        <div class="row mt-2">
          <div class="col-md-5"><ul id="resultList" class="list-group small"></ul></div>
          <div class="col-md-7"><div id="detail" class="border rounded p-3 text-break text-muted">請先選擇左側結果</div></div>
        </div>
      </div>
      <div class="modal-footer"><div id="countText" class="small text-muted me-auto"></div><button class="btn btn-secondary" data-bs-dismiss="modal">關閉</button></div>
    </div>
  </div>
</div>

<!-- 教師指定 Modal（含週次篩選） -->
<div class="modal fade" id="TeachingchengyuModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable modal-fullscreen-sm-down">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title me-2">👩‍🏫 教師指定成語</h5>
        <div class="d-flex align-items-center gap-2">
          <label for="tWeekSelect" class="form-label mb-0 small text-muted">週次</label>
          <select id="tWeekSelect" class="form-select form-select-sm" style="width:auto"></select>
        </div>
        <button class="btn-close ms-2" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="tLoading" class="d-none text-center py-2"><div class="spinner-border"></div></div>
        <div class="row mt-2">
          <div class="col-md-5"><ul id="tResultList" class="list-group small"></ul></div>
          <div class="col-md-7"><div id="tDetail" class="border rounded p-3 text-break text-muted">請先選擇左側結果</div></div>
        </div>
      </div>
      <div class="modal-footer">
        <div id="tCountText" class="small text-muted me-auto"></div>
        <button class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
      </div>
    </div>
  </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
/* ===== 基礎工具 ===== */
const socket = io();
const $ = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));

/* ===== 學生資訊顯示 + 返回參數 ===== */
(function initStudentInfo(){
  const raw = sessionStorage.getItem('studentCtx');
  if (!raw) { location.href = '/student/login.html'; return; }
  let ctx; try { ctx = JSON.parse(raw); } catch { sessionStorage.removeItem('studentCtx'); location.href='/student/login.html'; return; }
  const cls = String(ctx?.className||'').trim();
  const no  = String(ctx?.number||'').trim();
  const name= String(ctx?.name||'').trim() || '同學';
  if (!cls || !no) { sessionStorage.removeItem('studentCtx'); location.href='/student/login.html'; return; }
  $('#studentInfo').innerHTML = `班級：<b>${esc(cls)}</b> ／ 座號：<b>${esc(no)}</b> ／ 姓名：<b>${esc(name)}</b>`;
  const addParams = href => { const u=new URL(href,location.origin); u.searchParams.set('cls',cls); u.searchParams.set('no',no); return u.toString(); };
  $('#backHome').href = addParams($('#backHome').href);
  socket.emit('initStudentrom',cls,no,'studentstudy');
})();
socket.on('initStudentromResult',(msg)=>{
	
});
/* ===== 自由查詢：搜尋/詳情/TTS ===== */
const setLoading = on => $('#loading').classList.toggle('d-none', !on);
$('#btnSearch').addEventListener('click', search);
$('#kw').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

function search(){
  const q = $('#kw').value.trim();
  $('#resultList').innerHTML = '';
  $('#detail').textContent   = '請先選擇左側結果';
  $('#countText').textContent= '';
  if (!q) return;
  setLoading(true);
  socket.emit('studentsearchChengyu', q);                // 後端採用「純字串」參數
  socket.once('studentsearchChengyuResult', (rows=[]) => {
    setLoading(false);
    $('#countText').textContent = `共 ${rows.length} 筆`;
    if (!rows.length) { $('#resultList').innerHTML = '<li class="list-group-item text-muted">查無資料</li>'; return; }
    $('#resultList').innerHTML = rows.map((r,i)=>`
      <li class="list-group-item list-group-item-action" data-i="${i}">
        <div class="fw-semibold">${esc(r.idiom)}</div>
        <div class="text-muted text-truncate">${esc(r.meaning||'')}</div>
      </li>`).join('');
    $('#resultList').querySelectorAll('li').forEach(li=>{
      li.onclick = () => { renderDetail(rows[+li.dataset.i]); $('#resultList').querySelectorAll('li').forEach(x=>x.classList.remove('active')); li.classList.add('active'); };
    });
    $('#resultList').querySelector('li')?.click();
  });
}

function renderDetail(d){
  $('#detail').innerHTML = `
    <h4>${esc(d.idiom)}</h4>
    <p><strong>注音：</strong> ${esc(d.zhuyin||'')}</p>
    <p><strong>釋義：</strong> ${esc(d.meaning||'')}</p>
    <p><strong>用法說明：</strong> ${esc(d.usage_category||'')}</p>
    <p><strong>例句：</strong> <span style="white-space:pre-wrap">${esc(d.usage_example||'')}</span></p>
    <p><strong>近義成語：</strong> ${esc(d.near_synonyms||'')}</p>
    <p><strong>反義成語：</strong> ${esc(d.opposite_idioms||'')}</p>
    <div class="mt-2"><button class="btn btn-outline-primary btn-sm" onclick="tts('${esc(d.idiom)}')">🔊 播放語音</button></div>`;
}


function tts(word){
  socket.emit('studentttsWord', word);
  socket.once('studentttsWordResult', buf => {
    if (!buf) return;
    const url = URL.createObjectURL(new Blob([buf],{type:'audio/mpeg'}));
    const audio = new Audio(url);
    audio.play();
    audio.onended = () => URL.revokeObjectURL(url);
  });
}


/* ===== 教師指定（週次篩選） ===== */
const setTLoading = on => $('#tLoading').classList.toggle('d-none', !on);
let _teachingAll = [];
let _teachingByWeek = new Map();

function openTeacherModal(){
  new bootstrap.Modal($('#TeachingchengyuModal')).show();
  loadTeacherAll();
}
$('#openTeacherBtn')?.addEventListener('click', openTeacherModal);
$('#teacherCard')?.addEventListener('click', e => { if (!e.target.closest('button,a')) openTeacherModal(); });

function loadTeacherAll(){
  $('#tResultList').innerHTML = '';
  $('#tDetail').textContent   = '請先選擇左側結果';
  $('#tCountText').textContent= '';
  $('#tWeekSelect').innerHTML = '';
  _teachingAll = []; _teachingByWeek.clear();
  setTLoading(true);

  socket.emit('studentTeachingInit');                         // 後端回傳全部（含 week）
  socket.once('studentTeachingInitResult', (rows=[]) => {
    setTLoading(false);
    _teachingAll = rows || [];

    // 依 week 做分組
    for (const r of _teachingAll) {
      const w = Number(r.week) || 0;
      if (!w) continue;
      if (!_teachingByWeek.has(w)) _teachingByWeek.set(w, []);
      _teachingByWeek.get(w).push(r);
    }

    const weeks = [..._teachingByWeek.keys()].sort((a,b)=>a-b);
    if (!weeks.length){
      $('#tResultList').innerHTML = '<li class="list-group-item text-muted">尚無教師指定成語</li>';
      $('#tWeekSelect').innerHTML = '<option value="">無</option>';
      $('#tCountText').textContent = '共 0 筆';
      return;
    }

    // 週次下拉
    $('#tWeekSelect').innerHTML = weeks.map(w => `<option value="${w}">第 ${w} 週</option>`).join('');
    $('#tWeekSelect').onchange = () => renderTeacherWeek(Number($('#tWeekSelect').value));
    $('#tWeekSelect').value = weeks[0];
    renderTeacherWeek(weeks[0]);
  });
}

function renderTeacherWeek(week){
  const list = _teachingByWeek.get(Number(week)) || [];
  $('#tCountText').textContent = `第 ${week} 週，共 ${list.length} 筆`;
  if (!list.length){
    $('#tResultList').innerHTML = '<li class="list-group-item text-muted">此週沒有資料</li>';
    $('#tDetail').textContent   = '請先選擇左側結果';
    return;
  }
  $('#tResultList').innerHTML = list.map((r,i)=>`
    <li class="list-group-item list-group-item-action" data-i="${i}">
      <div class="fw-semibold">${esc(r.idiom)}</div>
      <div class="text-muted text-truncate">${esc(r.meaning || '')}</div>
    </li>`).join('');
  $('#tResultList').querySelectorAll('li').forEach(li=>{
    li.onclick = () => { renderTDetail(list[+li.dataset.i]); $('#tResultList').querySelectorAll('li').forEach(x=>x.classList.remove('active')); li.classList.add('active'); };
  });
  $('#tResultList').querySelector('li')?.click();
}

function renderTDetail(d){
  $('#tDetail').innerHTML = `
    <h4>${esc(d.idiom)}</h4>
    <p><strong>注音：</strong> ${esc(d.zhuyin||'')}</p>
    <p><strong>釋義：</strong> ${esc(d.meaning||'')}</p>
    <p><strong>用法說明：</strong> ${esc(d.usage_category||'')}</p>
    <p><strong>例句：</strong> <span style="white-space:pre-wrap">${esc(d.usage_example||'')}</span></p>
    <p><strong>近義成語：</strong> ${esc(d.near_synonyms||'')}</p>
    <p><strong>反義成語：</strong> ${esc(d.opposite_idioms||'')}</p>
        <div class="mt-2 d-flex gap-2">
      <button class="btn btn-outline-primary btn-sm" onclick="tts('${esc(d.idiom)}')">🔊 播放語音</button>
      <button class="btn btn-outline-success btn-sm" onclick="showImage('${esc(d.idiom)}')">🖼 顯示圖片</button>
    </div>
    <div id="iconArea" class="mt-2 text-center"></div>`;
}

function showImage(idiom){
  // 成語對應圖片網址，可改為你實際存放的圖片路徑
  const imgMap = {
    "小時了了": "/student/games/guessIdiom/image/img1.png",
    "胸有成竹": "/student/games/guessIdiom/image/img2.png",
    "世外桃源": "/student/games/guessIdiom/image/img3.png",
    "愚公移山": "/student/games/guessIdiom/image/img4.png",
    "孺子可教": "/student/games/guessIdiom/image/img5.png",
    "入木三分": "/student/games/guessIdiom/image/img6.png",
    "揚眉吐氣": "/student/games/guessIdiom/image/img7.png",
    "三顧茅廬": "/student/games/guessIdiom/image/img8.png",
    "守株待兔": "/student/games/guessIdiom/image/img9.png",
    "自相矛盾": "/student/games/guessIdiom/image/img10.png",
    "河東獅吼": "/student/games/guessIdiom/image/img11.png",
    "江郎才盡": "/student/games/guessIdiom/image/img12.png",
    "杞人憂天": "/student/games/guessIdiom/image/img13.png",
    "伯樂相馬": "/student/games/guessIdiom/image/img14.png",
    "不求甚解": "/student/games/guessIdiom/image/img15.png",
    "東施效顰": "/student/games/guessIdiom/image/img16.png",
    "如魚得水": "/student/games/guessIdiom/image/img17.png",
    "瞻前顧後": "/student/games/guessIdiom/image/img18.png",
    "井底之蛙": "/student/games/guessIdiom/image/img19.png",
    "揠苗助長": "/student/games/guessIdiom/image/img20.png",
    "舉一反三": "/student/games/guessIdiom/image/img21.png"
  };

  const url = imgMap[idiom];
  const iconArea = $('#iconArea');
  iconArea.innerHTML = '';

  if(url){
    const img = document.createElement('img');
    img.src = url;
    img.alt = idiom;
    img.style.maxWidth = '100%';
    img.style.height = 'auto';
    img.classList.add('img-fluid', 'rounded');
    iconArea.appendChild(img);
  } else {
    iconArea.textContent = '尚無圖片';
  }
}

</script>
</body>
</html>
