<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>📷 看圖猜成語</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .image-container {
      text-align: center;
      margin: 20px 0;
    }
    .image-container img {
      max-width: 320px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    #answerInput {
      width: 200px;
      text-align: center;
      font-size: 1.3rem;
      letter-spacing: 8px;
    }
  </style>
</head>
<body class="bg-light">
<div class="container py-4">

  <!-- 標題 -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>📷 看圖猜成語</h2>
    <button class="btn btn-outline-secondary" onclick="backToStage()">返回遊戲選擇</button>
  </div>

  <!-- 學生資訊 -->
  <div class="alert alert-info" id="studentInfo">學生資料載入中...</div>

  <!-- 題庫來源 -->
  <div id="quizSource" class="alert alert-secondary"></div>

  <!-- 題目內容 -->
  <div class="text-center">
    <div class="image-container mb-3">
      <img id="idiomImage" src="" alt="成語圖片">
    </div>
    <h5 class="mb-3">請根據圖片輸入正確的成語：</h5>
    <input type="text" id="answerInput" class="form-control d-inline-block text-center" maxlength="4" placeholder="輸入成語">
  </div>

  <!-- 回饋 -->
  <div id="feedback" class="text-center mt-3 fw-bold"></div>

  <!-- 按鈕 -->
  <div class="text-center mt-4">
    <button class="btn btn-primary me-2" id="checkAnswer">確認答案</button>
    <button class="btn btn-success me-2" id="nextQuestion" disabled>下一題</button>
    <button class="btn btn-outline-secondary" onclick="showHint()">提示</button>
  </div>

</div>

<!-- Bootstrap + socket.io -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
  // guess.js 重新改寫版（依照 puzzle.js 同風格、同架構）

const socket = io();
const $ = s => document.querySelector(s);
let quizData = { name: "", questions: [] };
let currentIndex = 0;
let shuffledQuestions = [];
let audioEl = null;
let studentCtx = null;

/* ====== 學生資訊 ====== */
(function initStudentInfo() {
  try {
    const raw = sessionStorage.getItem("studentCtx");
    const ctx = raw ? JSON.parse(raw) : {};
    studentCtx = ctx || {};

    const cls = String(ctx?.className ?? "").trim();
    const no = String(ctx?.number ?? "").trim();
    let name = String(ctx?.name ?? "").trim();
    const room = new URLSearchParams(location.search).get("room") || "studentGuess";

    const infoEl = $("#studentInfo");
    infoEl.textContent = `${cls ? cls + "班 " : ""}${no ? no + "號 " : ""}${name || ""}`;

    socket.emit("initStudentgames", cls, no, room);
    socket.on("initStudentgamesResult", (res) => {
      if (!res?.ok) return;
      if (res.name) {
        name = String(res.name).trim();
        const nextCtx = { ...ctx, name };
        sessionStorage.setItem("studentCtx", JSON.stringify(nextCtx));
        infoEl.innerHTML = `班級：<b>${cls}</b> ／ 座號：<b>${no}</b> ／ 姓名：<b>${name}</b>`;
      }
    });
  } catch {
    $("#studentInfo").textContent = "未登入 / 無學生資訊";
  }
})();

/* ====== 模式與週次 ====== */
const params = new URLSearchParams(location.search);
const mode = params.get("source") || localStorage.getItem("gameMode") || "teacher";
const selectedWeek = Number(params.get("week")) || Number(localStorage.getItem("selectedTeacherWeek")) || 1;
localStorage.setItem("selectedTeacherWeek", selectedWeek);

/* ====== 題目圖片表 ====== */
const idiomImages = {
  "小時了了": "image/img1.png",
  "胸有成竹": "image/img2.png",
  "世外桃源": "image/img3.png",
  "愚公移山": "image/img4.png",
  "孺子可教": "image/img5.png",
  "入木三分": "image/img6.png",
  "揚眉吐氣": "image/img7.png",
  "三顧茅廬": "image/img8.png",
  "守株待兔": "image/img9.png",
  "自相矛盾": "image/img10.png",
  "河東獅吼": "image/img11.png",
  "江郎才盡": "image/img12.png",
  "杞人憂天": "image/img13.png",
  "伯樂相馬": "image/img14.png",
  "不求甚解": "image/img15.png",
  "東施效顰": "image/img16.png",
  "如魚得水": "image/img17.png",
  "瞻前顧後": "image/img18.png",
  "井底之蛙": "image/img19.png",
  "揠苗助長": "image/img20.png",
  "舉一反三": "image/img21.png"
};

/* ====== 題庫初始化 ====== */
socket.on("connect", () => {
  socket.emit("idiomGameInit", {
    className: studentCtx?.className,
    number: studentCtx?.number,
    name: studentCtx?.name,
    gameMode: mode,
    space: "idiomGuess",
  });

  if (mode === "teacher") {
    socket.emit("getWeekQuiz", { week: selectedWeek });
  } else {
    socket.emit("getFreeQuiz");
  }
});

/* ====== 教師題庫 ====== */
socket.on("weekQuiz", (res) => {
  if (res?.success && Array.isArray(res.data) && res.data.length > 0) {
    quizData = {
      name: `第 ${selectedWeek} 週 教師指定題庫`,
      questions: res.data
        .filter(q => q.idiom && idiomImages[q.idiom])
        .map(q => ({ idiom: q.idiom, img: idiomImages[q.idiom] }))
    };
  } else {
    quizData = { name: "本週無題目", questions: [] };
  }
  startGame();
});

/* ====== 自由練習題庫 ====== */
socket.on("freeQuiz", (res) => {
  if (res.success && Array.isArray(res.data) && res.data.length > 0) {
    quizData = {
      name: "自由練習題庫",
      questions: res.data
        .filter(q => q.idiom && idiomImages[q.idiom])
        .map(q => ({ idiom: q.idiom, img: idiomImages[q.idiom] }))
    };
  } else {
    quizData = { name: "自由題庫目前無題目", questions: [] };
  }
  startGame();
});

/* ====== 開始遊戲 ====== */
function startGame() {
  $("#quizSource").innerHTML = `📘 題庫來源：<strong>${quizData.name}</strong> ${mode === "teacher" ? "(教師指定)" : "(自由練習)"}`;
  shuffledQuestions = shuffleArray([...quizData.questions]);
  currentIndex = 0;
  initQuestion();
}

/* ====== 顯示題目 ====== */
function initQuestion() {
  $("#feedback").innerHTML = "";
  $("#nextQuestion").disabled = true;
  $("#answerInput").value = "";

  if (currentIndex >= shuffledQuestions.length) {
    showFeedback("🎉 所有題目都完成了！", "success");
    $("#checkAnswer").disabled = true;
    $("#nextQuestion").disabled = true;
    return;
  }

  const q = shuffledQuestions[currentIndex];
  $("#idiomImage").src = q.img;
}

/* ====== 測驗：確認答案 ====== */
$("#checkAnswer").addEventListener("click", () => {
  const input = $("#answerInput").value.trim();
  const correct = shuffledQuestions[currentIndex].idiom;

  if (!input) return showFeedback("請輸入答案再確認！", "warning");

  if (input === correct) {
    socket.emit("chengyuWord", input);
    socket.once("chengyuWordResult", data => {
      const meaning = data?.meaning || "（無釋義資料）";
      showFeedback(`✅ 答對了！「${correct}」<br><small>${meaning}</small>`, "success");
      $("#nextQuestion").disabled = false;
    });
  } else {
    showFeedback("❌ 答錯了，再想想！", "danger");
  }
});

/* ====== 下一題 ====== */
$("#nextQuestion").addEventListener("click", () => {
  currentIndex++;
  initQuestion();
});

/* ====== 提示：顯示近義或語意 ====== */
function showHint() {
  const correct = shuffledQuestions[currentIndex].idiom;
  socket.emit("chengyuWord", correct);
  socket.once("chengyuWordResult", (data) => {
    const usage = data?.usage_semantics || "（無提示資料）";
    showFeedback(`<small>${usage}</small>`, "info");
  });
}

/* ====== 工具 ====== */
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function showFeedback(msg, type) {
  $("#feedback").innerHTML = `<div class="alert alert-${type} d-inline-block px-4 py-2 mb-0">${msg}</div>`;
}

function backToStage() {
  window.location.href = "/student/games.html?returnTo=gameSelect";
}

</script>

</body>
</html>
